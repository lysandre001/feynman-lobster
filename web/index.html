<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <title>费曼虾 · 契约</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--fg:#000;--muted:#666;--border:#e0e0e0}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
    .main{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;gap:2rem;padding:2rem;max-width:1200px;margin:0 auto}
    .left{display:flex;flex-direction:column;justify-content:center;gap:1.5rem}
    .label{font-family:ui-monospace,monospace;font-size:.75rem;letter-spacing:.2em;color:var(--muted)}
    .hero{font-size:1rem;color:var(--muted);line-height:1.6}
    .goal{font-size:2rem;font-weight:800;letter-spacing:-.02em;text-transform:uppercase;line-height:1.2}
    .bar{display:flex;align-items:center;gap:.5rem;font-family:ui-monospace,monospace;font-size:.875rem}
    .bar-track{flex:1;height:4px;background:var(--border);overflow:hidden}
    .bar-fill{height:100%;background:var(--fg);transition:width .3s}
    .specs{display:grid;grid-template-columns:100px 1fr;gap:.25rem .5rem;font-size:.8125rem}
    .spec-k{font-family:ui-monospace,monospace;color:var(--muted)}
    .details-btn{cursor:pointer;font-size:.8125rem;color:var(--muted);margin-top:1rem;transition:opacity .2s}
    .details-btn:hover{opacity:.7}
    .right{display:flex;align-items:center;justify-content:center;font-size:6rem}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;font-size:1.5rem;cursor:pointer;color:var(--muted);transition:opacity .2s}
    .nav:hover{opacity:.7}
    .overlay-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.08);z-index:9;opacity:0;pointer-events:none;transition:opacity .3s}
    .overlay-backdrop.open{opacity:1;pointer-events:auto}
    .overlay{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--bg);z-index:10;transform:translateX(100%);transition:transform .5s ease-out;overflow-y:auto;padding:2rem;border-left:1px solid var(--border)}
    .overlay.open{transform:translateX(0)}
    .overlay h2{font-size:.75rem;letter-spacing:.2em;color:var(--muted);margin:1.5rem 0 .5rem;border-bottom:1px solid var(--border);padding-bottom:.25rem}
    .overlay h2:first-of-type{margin-top:0}
    .overlay .close{cursor:pointer;font-size:.8125rem;color:var(--muted);margin-bottom:1rem;transition:opacity .2s}
    .overlay .close:hover{opacity:.7}
    .clause{display:flex;justify-content:space-between;align-items:baseline;font-size:.875rem;padding:.25rem 0}
    .clause.mastered{color:var(--fg)}
    .clause.in_progress{font-weight:600}
    .clause.pending{color:var(--muted)}
    .clause .meta{font-size:.75rem;color:var(--muted);margin-left:.5rem}
    .resource{font-size:.875rem;padding:.25rem 0}
    .resource a{color:var(--fg);text-decoration:none}
    .resource a:hover{text-decoration:underline}
    .conv{font-size:.8125rem;color:var(--muted);margin:.5rem 0;line-height:1.5}
    .empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
    .err{color:var(--muted);font-size:.875rem}
    @media(max-width:768px){.main{grid-template-columns:1fr}.right{font-size:4rem}}
  </style>
</head>
<body>
  <div id="app">
    <div class="empty">加载中…</div>
  </div>

  <script>
(function(){
  const API = 'http://localhost:18789/api/feynman';

  let contracts = [], idx = 0, overlayOpen = false, loadError = null;

  function pad(n){return String(n).padStart(2,'0')}
  function fmtDate(s){if(!s)return'';const d=new Date(s);return d.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'})}
  function daysLeft(d){return Math.ceil((new Date(d)-Date.now())/864e5)}
  function daysSince(d){return Math.ceil((Date.now()-new Date(d))/864e5)}

  function heroText(c){
    const m = c.clauses.filter(x=>x.status==='mastered').length;
    const t = c.clauses.length;
    const left = daysLeft(c.deadline);
    if(c.status==='completed')return `契约完成。${daysSince(c.created_at)} 天前你说要${c.goal}，现在你做到了。`;
    if(left<0)return `已逾期 ${Math.abs(left)} 天。还差 ${t-m} 个概念。`;
    if(t-m<=2)return `还差最后 ${t-m} 个概念。`;
    if(c.reward)return `Day ${daysSince(c.created_at)}。你已经教会龙虾 ${m} 个概念。距离那杯咖啡还有 ${t-m} 个。`;
    return `Day ${daysSince(c.created_at)}。你已经教会龙虾 ${m} 个概念了。`;
  }

  function render(){
    const app = document.getElementById('app');
    if(loadError){
      app.innerHTML=`<div class="empty">
        <p class="err" style="font-size:1rem;margin-bottom:1rem">⚠️ 无法连接 OpenClaw Gateway</p>
        <p class="err">${loadError}</p>
        <p class="err" style="margin-top:1.5rem;font-size:.875rem">
          <strong>方式一（推荐）</strong>：先启动 OpenClaw Gateway，再刷新此页<br>
          <code style="display:block;margin-top:.5rem;background:var(--border);padding:.5rem;font-size:.75rem">openclaw gateway</code>
        </p>
        <p class="err" style="margin-top:1rem;font-size:.875rem">
          <strong>方式二</strong>：若 Gateway 未提供 /api/feynman 端点，需安装 feynman-api 插件
        </p>
      </div>`;
      return;
    }
    if(!contracts.length){
      app.innerHTML='<div class="empty">还没有契约，去跟龙虾签一份吧。<br><small>在 IM 里说「我在做 XXX 项目」开始</small></div>';
      return;
    }
    const c = contracts[idx];
    const m = c.clauses.filter(x=>x.status==='mastered').length;
    const t = c.clauses.length;

    app.innerHTML=`
<div class="main">
  <div class="left">
    <span class="label">契约 ${pad(idx+1)} / ${pad(contracts.length)}</span>
    <p class="hero">${heroText(c)}</p>
    <h1 class="goal">${c.goal.toUpperCase()}</h1>
    <div class="bar"><span>${m} / ${t}</span><div class="bar-track"><div class="bar-fill" style="width:${t?m/t*100:0}%"></div></div></div>
    <div class="specs">
      <span class="spec-k">DEADLINE</span><span>${fmtDate(c.deadline)}${c.status==='active'?'（还剩 '+daysLeft(c.deadline)+' 天）':''}</span>
      <span class="spec-k">GOAL</span><span>${c.motivation||'-'}</span>
      <span class="spec-k">REWARD</span><span>${c.reward||'-'}</span>
    </div>
    <span class="details-btn" id="detailsBtn">Details +</span>
    <div class="nav">
      <span id="prev">←</span>
      <span id="next">→</span>
    </div>
  </div>
  <div class="right">🦞</div>
</div>
<div class="overlay-backdrop" id="backdrop"></div>
<div class="overlay" id="overlay">
  <span class="close" id="close">Close -</span>
  <h2>契约</h2>
  <p><strong>${c.goal}</strong> · 契约 ${pad(idx+1)} / ${pad(contracts.length)}</p>
  <p class="specs" style="margin-top:.5rem"><span class="spec-k">DEADLINE</span><span>${fmtDate(c.deadline)}</span><span class="spec-k">GOAL</span><span>${c.motivation||'-'}</span><span class="spec-k">REWARD</span><span>${c.reward||'-'}</span></p>
  ${(c.supervisors||[]).length?`<p><span class="spec-k">SUPERVISOR</span> ${c.supervisors.map(s=>s.agent_name).join(' · ')}</p>`:''}
  <h2>进度</h2>
  ${(c.clauses||[]).map(cl=>`<div class="clause ${cl.status}">${cl.status==='mastered'?'☑':cl.status==='in_progress'?'◐':'☐'} ${cl.concept}${cl.added_reason?' <span class="meta">新增：'+cl.added_reason+'</span>':''}${cl.mastered_at?' <span class="meta">'+fmtDate(cl.mastered_at)+' mastered</span>':cl.status==='in_progress'&&cl.attempts?' <span class="meta">尝试 '+cl.attempts+' 次</span>':''}</div>`).join('')}
  <p style="font-size:.75rem;color:var(--muted);margin-top:.5rem">${m} / ${t}</p>
  <h2>学习资料</h2>
  ${(c.resources||[]).length?c.resources.map(r=>`<div class="resource">◉ ${r.url?`<a href="${r.url}" target="_blank">${r.title}</a>`:r.title} ${r.url||r.path||''}</div>`).join(''):'<p class="conv">暂无</p>'}
  <h2>费曼对话</h2>
  <p class="conv">对话记录由 API 提供，需 Gateway 支持 /api/feynman。</p>
</div>`;

    function openPanel(){document.getElementById('backdrop').classList.add('open');document.getElementById('overlay').classList.add('open');overlayOpen=true}
    function closePanel(){document.getElementById('backdrop').classList.remove('open');document.getElementById('overlay').classList.remove('open');overlayOpen=false}
    document.getElementById('detailsBtn').onclick=openPanel;
    document.getElementById('close').onclick=closePanel;
    document.getElementById('backdrop').onclick=closePanel;
    document.getElementById('prev').onclick=()=>{if(idx>0){idx--;render()}};
    document.getElementById('next').onclick=()=>{if(idx<contracts.length-1){idx++;render()}};
    document.onkeydown=e=>{if(e.key==='ArrowLeft'&&idx>0){idx--;render()}else if(e.key==='ArrowRight'&&idx<contracts.length-1){idx++;render()}};
  }

  function load(d){
    loadError=null;
    contracts=(d.contracts||[]).filter(x=>x.status==='active'||x.status==='completed');
    idx=0;
    render();
  }
  fetch(API+'/contracts').then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status+' — Gateway 可能未提供 /api/feynman 端点');
    return r.json();
  }).then(load).catch(e=>{
    const msg=e.message||String(e);
    loadError=/fetch|network|Failed|ECONNREFUSED/i.test(msg)
      ?'无法连接 localhost:18789，请确认 OpenClaw Gateway 已启动'
      :msg;
    render();
  });
})();
  </script>
</body>
</html>
